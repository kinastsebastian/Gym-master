<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Tracker</title>
    <!-- Esta es la línea mágica que trae el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 1. Cargar tu ícono de espadas -->
    <link rel="apple-touch-icon" href="/icono.jpg">
    
    <!-- 2. Forzar Pantalla Completa Pura en iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 3. Poner la barra de batería/señal en modo oscuro y transparente -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <!-- 4. Bloquear el zoom para que no se acerque la pantalla al tipear rápido -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
